<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Success - Sovicle Google Connect</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>
  <div class="success-container">
    <div class="success-icon">
      <i class="fas fa-circle-check"></i>
    </div>
    
    <h1>Connection Successful!</h1>
    <p class="subtitle">Your Google Account has been connected successfully.</p>

    <div class="info">
      ✅ We have created your organisation's lead sheet.<br>
      ✅ Automation setup is in progress.<br>
      ✅ You will receive a confirmation shortly.
    </div>

    <button class="btn" onclick="window.close()">
      <i class="fas fa-arrow-left"></i> Back to Dashboard
    </button>

    <p style="margin-top: 30px; font-size: 14px; color: #64748b;">
      Need any help? Email: <strong><a href="mailto:soviclehq@gmail.com">soviclehq@gmail.com</a></strong>
    </p>
  </div>
</body>
  <script src="script.js"></script>

</html>
